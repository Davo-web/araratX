<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AraratX</title>
    <link rel="icon" href="./imgs/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header_logo">
            <img src="./imgs/logo.png" alt="logo" class="logo">
            <p class="logo-text">Ararat X</p>
        </div>

        <nav>
            <a href="#" class="nav_link">
                <p class="nav_item">Туры</p>
            </a>
            <a href="#" class="nav_link">
                <p class="nav_item">Безопасность</p>
            </a>
            <a href="#" class="nav_link">
                <p class="nav_item">О нас</p>
            </a>
            <a href="#" class="nav_link">
                <p class="nav_item">Контакты</p>
            </a>
        </nav>
    </header>

    <main>
        <video autoplay muted loop playsinline poster="./imgs/bg_img.png" class="main_bg">
            <source src="./vid/hayastan.mp4" type="video/mp4">
        </video>
        <div class="name">
            <p class="title">ARARAT X</p>
            <p class="subtitle">Экстремальные туры в Армении</p>
        </div>
        <button class="main_btn">Начать приключение</button>
        <p class="main_stats">10+ маршрутов   |   5 лет опыта   |   1000+ клиентов</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
